<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Menu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app is-hidden">
    <div class="backdrop"></div>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="shell">
      <aside class="sidebar">
        <div class="brand-card">
          <div class="brand-mark">A</div>
          <div class="brand-copy">
            <span class="brand-title">Arcane</span>
            <span class="brand-subtitle" id="playerName">display menu</span>
          </div>
        </div>

        <div class="sidebar-caption">Modules</div>
        <nav id="categoryList" class="category-list"></nav>

        <div class="sidebar-footer">
          <span class="sidebar-footer-label">Menu Key</span>
          <span id="menuKey" class="sidebar-footer-value">1</span>
        </div>
      </aside>

      <section class="workspace">
        <header class="workspace-header">
          <div>
            <span class="workspace-kicker" id="themeName">Blue theme</span>
            <h1 id="panelTitle" class="workspace-title">Arcane</h1>
          </div>

          <div class="workspace-actions">
            <div id="statusPills" class="status-pills"></div>
            <button id="closeButton" class="close-button" type="button">Close</button>
          </div>
        </header>

        <div id="tabList" class="tab-list"></div>

        <section class="content-frame">
          <div class="content-hero">
            <div>
              <span class="content-kicker">Interactive module</span>
              <h2 id="contentTitle" class="content-title">General</h2>
            </div>
            <span id="contentMeta" class="content-meta">0 options</span>
          </div>

          <div id="sectionGrid" class="section-grid"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
